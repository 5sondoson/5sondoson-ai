name: Deploy AI Server to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train dummy models
        run: python training/train_dummy_models.py

      - name: Run integration tests
        run: python tests/test_e2e.py

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -e
            cd ~/5sondoson-ai

            echo "===== 1. 최신 코드 가져오기 ====="
            git fetch origin main
            git reset --hard origin/main

            echo "===== 2. Docker 재빌드 ====="
            docker compose build

            echo "===== 3. 컨테이너 재시작 ====="
            docker compose down
            docker compose up -d

            echo "===== 4. 서버 준비 대기 (최대 90초) ====="
            for i in {1..30}; do
              sleep 3
              if curl -fs http://localhost:8000/health > /dev/null; then
                echo "서버 정상 (시도 $i)"
                break
              fi
              echo "  대기 중... ($i/30)"
            done

            echo "===== 5. 최종 헬스체크 ====="
            curl -f http://localhost:8000/health

            echo "===== 6. 모델 상태 확인 ====="
            curl -s http://localhost:8000/models/status | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            n_perf = len(data['performance'])
            n_mv = len(data['market_value'])
            n_sim = len(data['similarity'])
            print(f'performance: {n_perf}, market_value: {n_mv}, similarity: {n_sim}')
            "

            echo "===== 7. 옛 이미지 정리 ====="
            docker image prune -f

            echo "배포 완료"
